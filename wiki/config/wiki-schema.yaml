# Wiki page frontmatter schema definition
# Used by tools/validate.py to enforce page structure

required_fields:
  - title
  - type
  - domain
  - status
  - confidence
  - created
  - updated
  - sources
  - tags

optional_fields:
  - subdomain
  - aliases
  - complexity
  - resolution
  - layer
  - derived_from
  - maturity
  - instances
  - reversibility
  - priority
  - task_type
  - current_stage
  - readiness             # 0-100: definition completeness (is this READY to work on?)
  - progress              # 0-100: execution completeness (how far is the WORK?)
  - stages_completed
  - artifacts
  - estimate
  - epic
  - module
  - depends_on           # sequential composition — this task/epic requires these to complete first
  - followed_by          # sequential composition — after this completes, these start (forward reference)
  - promoted_from        # runtime promotion — previous model (e.g. "documentation" → "feature-development")
  - promoted_to          # runtime promotion — new model after promotion
  - promotion_reason     # runtime promotion — why the model changed
  - promoted_at          # runtime promotion — ISO date of the promotion event
  - methodology_doc_type # optional: declare methodology role (e.g. requirements-spec, ADR, tech-spec, test-plan) while retaining structural type (concept/decision/reference). Makes methodology identity queryable without new wiki types.
  - contributed_by       # audit: who/what contributed this page (e.g. "operator", "openarms-harness-v10", "gateway-cli")
  - contribution_source  # audit: origin path or "self" (e.g. "~/openarms" for sister-project contribution)
  - contribution_date    # audit: ISO date of contribution
  - contribution_status  # audit: pending-review / accepted / rejected / superseded
  - review_note          # audit: freeform note from the reviewer when a contribution is accepted/rejected; pairs with contribution_status transitions
  - note_type
  - last_reviewed        # audit: ISO date of last operator-review of this evolved page against its derived_from sources. Distinct from `updated` (content change) so reviewers can signal "still current" without aspirational date-bumping. Used by detect_stale.
  - impediment_type
  - blocked_by
  - blocked_since
  - escalated
  - resolution            # how an impediment was resolved
  - target_date
  - epics
  - acceptance_criteria

